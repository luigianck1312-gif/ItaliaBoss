  fight-join: "&aHai accettato la sfida! Preparati..."
  fight-no-boss: "&cNon c'\u00e8 nessun boss attivo al momento!"
  fight-already-dead: "&cSei morto durante la battaglia, non puoi rientrare!"
  fight-already-in: "&cSei gi\u00e0 nell'arena!"
  boss-dead: "&4&l\u2620 &6&lIL GILDED SENTINEL \u00c8 CADUTO! &4&l\u2620\n&7La sua oscurit\u00e0 si dissolve nell'etere...\n&aI valorosi combattenti possono ritirare le loro ricompense dall'NPC!"
  no-arena-set: "&cL'arena non \u00e8 stata configurata! Usa /boss setarena"
