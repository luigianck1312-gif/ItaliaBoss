# BossArena Configuration

arena:
  # Coordinate spawn boss - settabili con /boss setarena
  world: world
  x: 0.0
  y: 64.0
  z: 0.0

player-spawn:
  # Coordinate spawn player - settabili con /boss setspawn
  world: world
  x: 0.0
  y: 64.0
  z: 0.0

boss:
  # Nome del mob MythicMobs da spawnare
  mythic-name: GildedSentinel
  # Ore tra uno spawn automatico e l'altro (48 = 2 giorni)
  auto-spawn-hours: 48
  # Minimo player online per spawn automatico
  min-players: 5
  # Secondi di attesa tra l'annuncio e lo spawn effettivo
  spawn-delay-seconds: 20

